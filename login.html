<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FashionHub Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:pink;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    width:350px;
    text-align:center;
}

h1{
    color:black;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:black;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:deeppink;
}

a{
    color:black;
    text-decoration:none;
}

p{
    margin-top:15px;
}

</style>
</head>

<body>

<div class="login-box">

    <h1>💖 FashionHub Login</h1>

    <form>
        <input type="text" placeholder="Username" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p><a href="#">Forgot Password?</a></p>
    <p>Don't have an account? <a href="#">Sign Up</a></p>

</div>

</body>
</html>
