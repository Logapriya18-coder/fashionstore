<!DOCTYPE html>
<html>
<head>
<title>Stylish Dress Collection</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:pink;
}
.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}
.card{
    width:220px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px gray;
}
.price{
    font-size: 18px;
    font-weight: bold;
    color: palevioletred;
}
.card img{
    background-color: black;
    width:100%;
    height:250px;
}
button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:deeppink;
}
</style>
</head>
<body>
   <h1>All Dresses Collection</h1>
   <div class="products">
       <div class="card">
         <img src="images1/floral dress.png" alt="Floral Dress">
         <h3>Floral Dress</h3>
          <div class="rating">
             ★★★★☆ <span>(120 Reviews)</span>
    </div>
             <p class="price">₹999</p>
             <button>Add to Cart</button>
    </div>
       <div class="card">
             <img src="images1/party wear dress.jpeg" alt="Party Wear Dress">
             <h3>Party Wear Dress</h3>
             <div class="rating">
               ★★★★☆ <span>(100 Reviews)</span> 
             </div>
             <p class="Price">₹1499</p>
             <button>Add to cart</button>
        </div>

    <div class="card">
              <img src="images1/causal dress.jpeg" alt="Causal Dress">
             <h3>Casual Dress</h3>
             <div class="rating">
                ★★★★☆ <span>(140 Reviews)</span>
            </div>
            <p class="price">₹899</p>
            <button>Add to cart</button>
     </div>
    <div class="card">
             <img src="images1/Long gown.jpeg" alt="Long gown">
             <h3>Long Gown</h3>
             <div class="rating">
                ★★★★☆ <span>(200 Reviews)</span>
            </div>
            <p class="price">₹1999</p>
            <button>Add to cart</button>
    </div>


</body>
</html>
