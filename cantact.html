<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - FashionHub</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:pink;
}

.container{
    width:80%;
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:black;
    font-size:40px;
}

.contact-info{
    margin-top:20px;
    background:#fff0f5;
    padding:20px;
    border-radius:10px;
}

.contact-info p{
    font-size:18px;
    margin:10px 0;
}

form{
    margin-top:25px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:120px;
}

button{
    background:black;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#c2185b;
}

</style>
</head>

<body>

<div class="container">

<h1>💖 Contact FashionHub 💖</h1>

<div class="contact-info">
    <p>📞 Phone: +91  044-2345 6789</p>
    <p>📧 Email: FashionHub@gmail.com</p>
    <p>📍 Location: Chennai, Tamil Nadu</p>
</div>

<form>
    <input type="text" placeholder="Your Name" required>

    <input type="email" placeholder="Your Email" required>

    <textarea placeholder="Your Message"></textarea>

    <button type="submit">Send Message</button>
</form>

</div>

</body>
</html>
