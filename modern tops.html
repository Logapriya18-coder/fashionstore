<!DOCTYPE html>
<html>
<head>
<title>Modern Tops Collection</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: pink;
}

.products{
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card{
    width: 220px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 8px gray;
}

.card img{
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
}

.rating{
    color: black;
}

.price{
    font-size: 18px;
    font-weight: bold;
    color: palevioletred;
}

button{
    background: black;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background:deeppink;
}
</style>
</head>

<body>

<h1>Modern Tops Collection</h1>

<div class="products">

    <div class="card">
        <img src="images1/crop top.jpeg" alt="Crop Top">
        <h3>Crop Top</h3>
        <div class="rating">★★★★☆ (120 Reviews)</div>
        <p class="price">₹699</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images1/printed top.jpeg" alt="Printed Top">
        <h3>Printed Top</h3>
        <div class="rating">★★★★★ (150 Reviews)</div>
        <p class="price">₹799</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images1/causal top.jpeg" alt="Causal Top">
        <h3>Casual Top</h3>
        <div class="rating">★★★★☆ (100 Reviews)</div>
        <p class="price">₹599</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="images1/designer top.jpeg" alt="Designer Top">
        <h3>Designer Top</h3>
        <div class="rating">★★★★★ (200 Reviews)</div>
        <p class="price">₹999</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
